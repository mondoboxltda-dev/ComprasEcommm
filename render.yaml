services:
  - type: web
    name: compraspro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_INITIAL_NAME
        value: Administrador
      - key: ADMIN_INITIAL_LOGIN
        value: admin
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
