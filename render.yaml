services:
  - type: web
    name: compraspro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --threads 2 --timeout 120 wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_INITIAL_NAME
        value: Administrador
      - key: ADMIN_INITIAL_LOGIN
        value: admin
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: DB_CONNECT_TIMEOUT
        value: 10
      - key: SESSION_COOKIE_SECURE
        value: 1
